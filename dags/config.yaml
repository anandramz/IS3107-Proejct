# config.yaml
defaults:
  compression: "snappy"
  chunk_size: 100000

paths:
  base_dir: "data"
  raw_dir: "${paths.base_dir}/raw"
  staging_dir: "${paths.base_dir}/staging"
  output_dir: "${paths.base_dir}/processed"

datasets:
  yelp:
    base_dir: "${paths.raw_dir}/Yelp JSON/yelp_dataset"
    business:
      raw_file: "yelp_academic_dataset_business.json"
      staging_file: "yelp_business.parquet"
      columns_to_keep: ["business_id", "name", "city", "state", "stars", "review_count", "categories", "postal_code"]
      processing:
        chunk_size: 50000  
        sample_pct: 1.0    
    
    review:
      raw_file: "yelp_academic_dataset_review.json"
      staging_file: "yelp_reviews_silver.parquet"
      columns_to_keep: ["business_id", "stars", "text", "date"]
      processing:
        chunk_size: 250000 
        sample_pct: 0.2    
        max_records: 1000000
  
  demographics:
    kaggle_id: "mexwell/us-cities-demographics"
    base_dir: "${paths.raw_dir}/demographics"
    raw_file: "us-cities-demographics.csv" 
    staging_file: "demographics_silver.parquet"
    columns_to_keep: ["city", "state_code", "median_age", "total_population", "average_household_size"]

  irs:
    base_dir: "${paths.raw_dir}/zipcode2022"
    raw_file: "22zpallagi.csv"
    staging_file: "irs_silver.parquet"
    # agi_stub: Adjusted Gross Income
    # n1: number of (tax) returns
    # n2: number of individuals
    # mars2: # of joint returns
    columns_to_keep: ["zipcode", "agi_stub", "n1", "n2", "mars2"]

  yelp_irs:
    staging_file: "yelp_irs_joined.parquet"

  yelp_irs_demographics:
    staging_file: "yelp_irs_demographics_joined.parquet"


